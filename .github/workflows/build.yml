name: build

# Builds p4-rs on Windows (MSVC) and Linux (glibc), in the spirit of
# perforce/p4python: the Perforce C++ API is downloaded from Perforce filehost at
# build time (cached, never committed) and OpenSSL/zlib come from Conan. Each job
# downloads its own SDK, and conanfile.py + build.rs read the OpenSSL version out
# of that SDK, so nothing about OpenSSL is hardcoded.
#
# OpenSSL/zlib come from Conan 2 (center2 remote); the deploy_flat.py deployer
# reproduces the flat openssl/ + zlib/ layout build.rs expects.
#
# NOTE (first-run tuning): the SDK download coordinates can't be validated offline.
# The P4_RELEASE / *_ZIP / *_TGZ names must be real filehost paths for that release
# -- browse https://filehost.perforce.com/perforce/ to confirm. If center2 lacks the
# exact OpenSSL version the SDK reports, set OPENSSL_VERSION (per job) to the nearest
# one in the same series to override the detection.
#
# fmt/clippy run as advisory (continue-on-error) so they surface issues without
# failing the build; flip them to blocking once the tree is clean.

on:
  push:
    # `code-improvements` is here temporarily to validate on the branch;
    # remove it before merge (the PR trigger covers review).
    branches: [main, code-improvements]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  P4_RELEASE: r25.2
  FILEHOST: https://cdist2.perforce.com/perforce

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      P4_PLATFORM: bin.ntx64
      P4API_ZIP: p4api_vs2022_static_openssl3.zip
      # OpenSSL is auto-detected from the SDK (reports 3.0.19) and resolved from
      # Conan 2's center2 remote. Uncomment to override if that exact patch is
      # ever missing from the remote:
      # OPENSSL_VERSION: "3.0.16"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy

      - name: Set up Python (for Conan)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan 2
        run: pip install "conan>=2"

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            p4api
            p4d.exe
            openssl
            zlib
            ~/.conan2
          key: deps-${{ runner.os }}-${{ env.P4_RELEASE }}-${{ env.P4API_ZIP }}-${{ hashFiles('conanfile.py') }}

      - name: Download P4 C++ API
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "$env:FILEHOST/$env:P4_RELEASE/$env:P4_PLATFORM/$env:P4API_ZIP"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile p4api.zip
          Expand-Archive -Path p4api.zip -DestinationPath p4api-extracted
          $inner = Get-ChildItem -Directory p4api-extracted | Select-Object -First 1
          Move-Item $inner.FullName p4api

      - name: Download p4d (for integration tests)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "$env:FILEHOST/$env:P4_RELEASE/$env:P4_PLATFORM/p4d.exe"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile p4d.exe

      # Set P4API_PATH before Conan so conanfile.py reads the OpenSSL version from
      # this exact SDK (deterministic) instead of scanning for a p4api* directory.
      - name: Expose dependency paths
        shell: pwsh
        run: |
          "P4API_PATH=$(Resolve-Path p4api)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "P4D_BIN=$(Resolve-Path p4d.exe)" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Conan 2 auto-detects msvc + runtime=dynamic on the runner. We pin
      # compiler.version=194 (VS2022) because center2 publishes a prebuilt OpenSSL
      # for that config -- so OpenSSL is DOWNLOADED, never built from source (which
      # would need perl/nasm). OpenSSL is C and ABI-stable across MSVC versions, so
      # a 194-built OpenSSL links fine even if the bridge is compiled by another
      # MSVC. The deploy_flat deployer writes the flat openssl/ + zlib/ layout.
      - name: Conan install (prebuilt OpenSSL + zlib, matched to the SDK)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          conan profile detect --force
          conan install . -s compiler.version=194 --deployer=deploy_flat --deployer-folder=. --output-folder=conan-build --build=missing

      - name: Format check (advisory)
        continue-on-error: true
        run: cargo fmt --all --check

      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --all-targets

      - name: Build
        run: cargo build --release

      - name: Tests
        run: cargo test --release

      - name: Integration tests (against downloaded p4d)
        run: cargo test --release -- --ignored --nocapture

      - name: Stage artifact with license
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/p4-rs.exe dist/
          Copy-Item LICENSE.txt dist/

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: p4-rs-windows-x86_64
          path: dist/
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    env:
      P4_PLATFORM: bin.linux26x86_64
      P4API_TGZ: p4api-glibc2.12-openssl3.tgz
      # OpenSSL auto-detected from the SDK and resolved from Conan 2's center2.
      # Uncomment to override if that exact patch is ever missing from the remote:
      # OPENSSL_VERSION: "3.0.16"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy

      - name: Set up Python (for Conan)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan 2
        run: pip install "conan>=2"

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            p4api
            p4d
            openssl
            zlib
            ~/.conan2
          key: deps-${{ runner.os }}-${{ env.P4_RELEASE }}-${{ env.P4API_TGZ }}-${{ hashFiles('conanfile.py') }}

      - name: Download P4 C++ API
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          url="$FILEHOST/$P4_RELEASE/$P4_PLATFORM/$P4API_TGZ"
          echo "Downloading $url"
          curl -fSL "$url" -o p4api.tgz
          mkdir -p p4api-extracted
          tar -xzf p4api.tgz -C p4api-extracted
          mv "$(find p4api-extracted -maxdepth 1 -mindepth 1 -type d | head -n1)" p4api

      - name: Download p4d (for integration tests)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          url="$FILEHOST/$P4_RELEASE/$P4_PLATFORM/p4d"
          echo "Downloading $url"
          curl -fSL "$url" -o p4d
          chmod +x p4d

      # Set P4API_PATH before Conan so conanfile.py reads the OpenSSL version from
      # this exact SDK (deterministic) instead of scanning for a p4api* directory.
      - name: Expose dependency paths
        run: |
          echo "P4API_PATH=$(pwd)/p4api" >> "$GITHUB_ENV"
          echo "P4D_BIN=$(pwd)/p4d" >> "$GITHUB_ENV"

      # Conan 2 auto-detects gcc + libstdc++11. We pin compiler.version=13 because
      # center2 publishes a prebuilt OpenSSL for that config -- so OpenSSL is
      # DOWNLOADED, never built from source (no perl/nasm). OpenSSL is C and
      # ABI-stable across gcc versions, so a gcc-13 build links fine regardless of
      # the bridge's gcc. The deploy_flat deployer writes the flat layout.
      - name: Conan install (prebuilt OpenSSL + zlib, matched to the SDK)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          conan profile detect --force
          conan install . -s compiler.version=13 --deployer=deploy_flat --deployer-folder=. --output-folder=conan-build --build=missing

      - name: Format check (advisory)
        continue-on-error: true
        run: cargo fmt --all --check

      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --all-targets

      - name: Build
        run: cargo build --release

      - name: Tests
        run: cargo test --release

      - name: Integration tests (against downloaded p4d)
        run: cargo test --release -- --ignored --nocapture

      - name: Stage artifact with license
        run: |
          mkdir -p dist
          cp target/release/p4-rs dist/
          cp LICENSE.txt dist/

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: p4-rs-linux-x86_64
          path: dist/
          if-no-files-found: error
